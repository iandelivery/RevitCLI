name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip
  GO_VERSION: '1.22'

jobs:
  # -----------------------------------------------------------------------
  # Build the C# bridge for all supported Revit versions
  # -----------------------------------------------------------------------
  build-bridge:
    runs-on: windows-latest
    strategy:
      matrix:
        revit-version: [2019, 2020, 2021, 2022]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-bridge-${{ hashFiles('bridge/**/*.csproj') }}
          restore-keys: |
            nuget-bridge-

      - name: Build bridge (Revit ${{ matrix.revit-version }})
        working-directory: bridge
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $parts = $version -split '\.'
          $major = if ($parts.Length -gt 0) { $parts[0] } else { "1" }
          $minor = if ($parts.Length -gt 1) { $parts[1] } else { "0" }
          $patch = if ($parts.Length -gt 2) { $parts[2] } else { "0" }
          $configTag = switch ("${{ matrix.revit-version }}") {
            "2019" { "R19" }
            "2020" { "R20" }
            "2021" { "R21" }
            "2022" { "R22" }
          }
          $buildConfig = "Release $configTag"
          $outputDir = "dist/Revit${{ matrix.revit-version }}"
          dotnet build RevitCliBridge\RevitCliBridge.csproj -p:Configuration="$buildConfig" -p:Platform=x64 -p:Major=$major -p:Minor=$minor -p:Patch=$patch -o "$outputDir"

      - name: Generate version-specific config
        working-directory: bridge
        shell: pwsh
        run: |
          $version = [int]"${{ matrix.revit-version }}"
          $port = 5000 + ($version - 2018) * 10 + 1
          $configDir = "dist/Revit${{ matrix.revit-version }}/.config"
          New-Item -ItemType Directory -Path $configDir -Force | Out-Null
          $setting = @{
            schema_version         = "1"
            enabled               = $true
            port                  = $port
            auto_port             = $true
            timeout_seconds       = 180
            max_command_queue_size = 100
            allow_raw_execution   = $false
          } | ConvertTo-Json -Depth 10
          Set-Content -Path "$configDir/cli_bridge_setting.json" -Value $setting -Encoding UTF8

      - name: Upload bridge artifact (Revit ${{ matrix.revit-version }})
        uses: actions/upload-artifact@v4
        with:
          name: bridge-Revit${{ matrix.revit-version }}
          path: bridge/dist/Revit${{ matrix.revit-version }}/
          retention-days: 7

  # -----------------------------------------------------------------------
  # Build the Go client
  # -----------------------------------------------------------------------
  build-client:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: client/go.sum

      - name: Build client
        working-directory: client
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          go vet ./...
          go build -trimpath -ldflags="-s -w -X main.Version=$version" -o revit-cli.exe ./cmd/revit-cli
          Get-ChildItem revit-cli.exe | Format-List Name,Length,LastWriteTime
          & .\revit-cli.exe --version

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: client/revit-cli.exe
          retention-days: 7

  # -----------------------------------------------------------------------
  # Package and create GitHub Release
  # -----------------------------------------------------------------------
  release:
    needs: [build-bridge, build-client]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: Get-ChildItem -Path artifacts -Recurse | Select-Object FullName

      - name: Create distribution packages
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $bridgeVersions = @(2019, 2020, 2021, 2022)

          # --- Primary package: revit-cli + bridge bundled together ---
          # Users download this single zip and run configure setup — done.
          $stagingDir = "staging/revit-cli"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          # CLI client at the root
          Copy-Item -Path "artifacts/client-windows/revit-cli.exe" -Destination $stagingDir

          # SKILL.md — AI agent integration instructions
          Copy-Item -Path "client/skills/revit-cli/SKILL.md" -Destination $stagingDir

          # Bridge files under bridge/ — the client's configure setup
          # discovers them via the bridge/ subdirectory convention
          $bridgeDir = "$stagingDir/bridge"
          New-Item -ItemType Directory -Path $bridgeDir -Force | Out-Null
          foreach ($v in $bridgeVersions) {
            $srcDir = "artifacts/bridge-Revit$v"
            $destDir = "$bridgeDir/Revit$v"
            New-Item -ItemType Directory -Path $destDir -Force | Out-Null
            Copy-Item -Path "$srcDir\*" -Destination $destDir -Recurse -Force
          }

          Compress-Archive -Path "$stagingDir\*" -DestinationPath "revit-cli-$version.zip" -Force
          Write-Host "Created: revit-cli-$version.zip"

          # --- Secondary package: CLI client + SKILL.md only ---
          # For users who only need the Go client and AI agent skill
          # documentation, without any bridge binaries. Useful when the
          # user plans to build the bridge themselves or will obtain the
          # bridge files from a separate source.
          $clientOnlyDir = "staging/revit-cli-client"
          New-Item -ItemType Directory -Path $clientOnlyDir -Force | Out-Null
          Copy-Item -Path "artifacts/client-windows/revit-cli.exe" -Destination $clientOnlyDir
          Copy-Item -Path "client/skills/revit-cli/SKILL.md" -Destination $clientOnlyDir
          Compress-Archive -Path "$clientOnlyDir\*" -DestinationPath "revit-cli-client-$version.zip" -Force
          Write-Host "Created: revit-cli-client-$version.zip"

          # --- Secondary packages: per-version bridge zips for users who
          #      only need the add-in without the CLI client ---
          foreach ($v in $bridgeVersions) {
            $srcDir = "artifacts/bridge-Revit$v"
            $zipName = "RevitCliBridge-Revit$v-$version.zip"
            Compress-Archive -Path "$srcDir\*" -DestinationPath $zipName -Force
            Write-Host "Created: $zipName"
          }

      - name: Verify release packages
        shell: pwsh
        run: |
          # List every zip with its contents so failures here are obvious
          # in the run log, and confirm revit-cli.exe is actually inside.
          Get-ChildItem -Filter *.zip | ForEach-Object {
            Write-Host "=== $($_.Name) ==="
            Expand-Archive -Path $_.FullName -DestinationPath "verify/$($_.BaseName)" -Force
            Get-ChildItem -Path "verify/$($_.BaseName)" -Recurse | Select-Object FullName,Length
            $hasExe = (Get-ChildItem -Path "verify/$($_.BaseName)" -Filter revit-cli.exe -Recurse).Count -gt 0
            if ($_.Name -like "revit-cli-client-*") {
              if (-not $hasExe) { throw "revit-cli.exe missing in $($_.Name)" }
            }
          }
          Remove-Item -Recurse -Force verify

      - name: Generate release notes
        id: release-notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''

          $notes = @"
          ## Revit CLI $version

          ### Downloads

          | Package | Description |
          |--------|-------------|
          | ``revit-cli-$version.zip`` | Complete package — CLI client + bridge for all Revit versions (recommended) |
          | ``revit-cli-client-$version.zip`` | CLI client and ``SKILL.md`` only — no bridge |
          | ``RevitCliBridge-Revit2019-$version.zip`` | Bridge add-in for Revit 2019 only |
          | ``RevitCliBridge-Revit2020-$version.zip`` | Bridge add-in for Revit 2020 only |
          | ``RevitCliBridge-Revit2021-$version.zip`` | Bridge add-in for Revit 2021 only |
          | ``RevitCliBridge-Revit2022-$version.zip`` | Bridge add-in for Revit 2022 only |

          ### Quick Start

          1. Download ``revit-cli-$version.zip`` and extract to any directory.
          2. Open a terminal in the extracted folder.
          3. Run ``revit-cli.exe configure setup`` — this detects installed Revit versions and installs the bridge add-in automatically.
          4. Restart Revit — the bridge will load and listen for commands.

          ### Supported Revit Versions

          | Version | .NET Framework | Base Port |
          |---------|---------------|-----------|
          | 2019    | 4.7           | 5011      |
          | 2020    | 4.7           | 5021      |
          | 2021    | 4.8           | 5031      |
          | 2022    | 4.8           | 5041      |

          ### Package Contents

          ``revit-cli-$version.zip`` includes:
          - ``revit-cli.exe`` — CLI client for sending commands to the bridge
          - ``SKILL.md`` — AI agent integration instructions
          - ``bridge/Revit20XX/`` — Version-specific bridge DLLs and configuration
          - Each bridge version includes:
            - ``RevitCliBridge.dll``
            - ``RevitCliBridge.Abstractions.dll``
            - ``RevitCliBridge.addin``
            - ``.config/cli_bridge_setting.json``

          ``revit-cli-client-$version.zip`` includes:
          - ``revit-cli.exe`` — CLI client only
          - ``SKILL.md`` — AI agent integration instructions
          "@

          Set-Content -Path "release-notes.md" -Value $notes -Encoding UTF8
          Write-Host "Release notes generated."

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $hashes = Get-ChildItem -Filter *.zip | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          $hashes | Set-Content -Path "checksums-sha256.txt" -Encoding UTF8
          Write-Host "Checksums:"
          Get-Content checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            *.zip
            checksums-sha256.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
